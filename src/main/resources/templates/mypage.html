<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>マイページ</title>
</head>
<body>

<h1>マイページ</h1>

<p>ニックネーム: <span th:text="${user.nickname}">ニックネーム</span></p>
<p>メール: <span th:text="${user.email}">メール</span></p>

<a th:href="@{/mypage/edit}">プロフィール編集</a>
<a th:href="@{/timeline}">タイムライン</a>


</body>
</html>
