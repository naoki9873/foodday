<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>アカウント登録</title>
</head>
<body>
<h2>アカウント登録</h2>
<div th:if="${errorMessage}" style="color:red;" th:text="${errorMessage}"></div>
<form action="/register/submit" method="post">
	<label>ニックネーム<input type="text" name="username" required></label>
	<small>1～20文字で入力してください</small><br>

	<label>ユーザーID<input type="text" name="userid" required></label>
	<small>3～50文字で入力してください</small><br>

	<label>メールアドレス<input type="email" name="email" required></label>
	<small>正しい形式のメールアドレスを入力してください（例：example@mail.com）</small><br>

	<label>パスワード<input type="password" name="password" required></label>
	<small>8～60文字、半角英数字で数字と英字を含めてください</small><br>

	<label>パスワード確認<input type="password" name="passwordConfirm" required></label>
	<small>上と同じパスワードを入力してください</small><br>

	<button type="submit">登録する</button>
</form>
<p><a href="/login">ログインはこちら</a></p>
</body>
</html>
